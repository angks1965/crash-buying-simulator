<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crash Buying Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
<style>
  html, body { margin: 0; padding: 0; background: #f8f9fb; }
  * { box-sizing: border-box; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes spin { to{transform:rotate(360deg)} }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #f1f5f9; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>
</head>
<body>
<div id="root">
  <div style="font-family:-apple-system,sans-serif;padding:60px;color:#64748b;text-align:center;font-size:15px;">
    Loading Crash Buying Simulator…
    <div style="font-size:11px;margin-top:8px;color:#94a3b8;">If this persists, open the browser console (F12) and check for errors.</div>
  </div>
</div>

<script>
window.addEventListener('error', function(e) {
  var r = document.getElementById('root');
  if (r) r.innerHTML = '<div style="font-family:monospace;padding:24px;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;margin:20px;white-space:pre-wrap;"><strong>Script error:</strong>\n'+(e.message||'Unknown')+(e.filename?'\n\n'+e.filename+':'+e.lineno:'')+'</div>';
});
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ─── Config ───────────────────────────────────────────────────────────────────
const TICKERS = [
  { id:"SPX",  label:"SPX",  fullName:"S&P 500 Index",          avSym:"^GSPC" }, // ^GSPC works with TIME_SERIES_WEEKLY on free tier
  { id:"SPY",  label:"SPY",  fullName:"SPDR S&P 500 ETF",       avSym:"SPY"   },
  { id:"QQQ",  label:"QQQ",  fullName:"Invesco Nasdaq-100 ETF",  avSym:"QQQ"   },
  { id:"VOO",  label:"VOO",  fullName:"Vanguard S&P 500 ETF",    avSym:"VOO"   },
  { id:"URTH", label:"URTH", fullName:"iShares MSCI World ETF",  avSym:"URTH"  },
];

const TIERS = [
  { drawdown:10, pct:10 },
  { drawdown:15, pct:15 },
  { drawdown:20, pct:20 },
  { drawdown:25, pct:25 },
  { drawdown:30, pct:30 },
];

// FIX 1: Events now carry dates so clicking them jumps the chart
const EVENTS = [
  { label:"START",              date:null           },
  { label:"2018 Trade War",     date:"2018-10-01"   },
  { label:"2020 Covid",         date:"2020-02-20"   },
  { label:"2022 Inflation",     date:"2022-01-03"   },
  { label:"2025 Liberation Day",date:"2025-04-02"   },
];

// ─── Alpha Vantage API key (stored in localStorage) ─────────────────────────
const AV_KEY_STORAGE = "cbs_av_key_v1";
function getAvKey(){ try{ return localStorage.getItem(AV_KEY_STORAGE)||""; }catch(e){ return ""; } }
function saveAvKey(k){ try{ localStorage.setItem(AV_KEY_STORAGE,k.trim()); }catch(e){} }

// ─── Helpers ──────────────────────────────────────────────────────────────────
const fmt$ = (n,d=2)=>{
  if(n==null||isNaN(n)) return "—";
  const s=n<0?"-":"";
  return `${s}$${Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})}`;
};
const fmtU  = n=>(n==null||isNaN(n))?"0.0000":n.toLocaleString("en-US",{minimumFractionDigits:4,maximumFractionDigits:4});
const fmtDt = d=>{ const dt=typeof d==="string"?new Date(d):d; return dt.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}); };
const dayN  = (ds,ep)=>Math.round((new Date(ds)-ep)/86400000);

// ─── Alpha Vantage fetch ─────────────────────────────────────────────────────
// AV has proper CORS headers — no proxy needed
async function fetchAV(avSym, apiKey){
  // TIME_SERIES_WEEKLY returns full 20+ year history on the free tier
  // Weekly granularity is sufficient for drawdown-trigger backtesting
  const url=`https://www.alphavantage.co/query?function=TIME_SERIES_WEEKLY&symbol=${avSym}&apikey=${apiKey}`;
  const r=await fetch(url,{signal:AbortSignal.timeout(30000)});
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  const json=await r.json();
  if(json["Note"]||json["Information"]) throw new Error(json["Note"]||json["Information"]);
  const ts=json["Weekly Time Series"];
  if(!ts) throw new Error("No weekly time series in response — check API key");
  const rows=Object.entries(ts)
    .filter(([d])=>d>="2016-01-01")
    .map(([d,v])=>({date:d,close:parseFloat(v["4. close"])}))
    .sort((a,b)=>a.date.localeCompare(b.date));
  if(rows.length<50) throw new Error("Too few rows returned: "+rows.length);
  return rows;
}

const CACHE_KEY = id=>`cbs_prices_v5_weekly_${id}`; // v5 = ^GSPC fix for SPX

function loadFromCache(id){
  try{
    const c=localStorage.getItem(CACHE_KEY(id));
    if(c){const{rows,ts}=JSON.parse(c);return{rows,source:"cached",cacheDate:new Date(ts).toLocaleDateString()};}
  }catch(e){}
  return null;
}

function saveToCache(id,rows){
  try{localStorage.setItem(CACHE_KEY(id),JSON.stringify({rows,ts:Date.now()}));}catch(e){}
}

async function fetchTickerLive(ticker, apiKey){
  const rows=await fetchAV(ticker.avSym, apiKey);
  if(rows.length<50) throw new Error("too few rows: "+rows.length);
  saveToCache(ticker.id, rows);
  console.log("[CBS] loaded",rows.length,"rows for",ticker.id);
  return {rows,source:"live",sourceLabel:"Alpha Vantage"};
}

// Sleep helper for rate limiting
const sleep = ms=>new Promise(r=>setTimeout(r,ms));

// ─── Per-ticker Simulator ────────────────────────────────────────────────────
function TickerSim({ticker, priceData}){
  // priceData passed from App's central store — no internal fetching
  const loading = priceData.source==="" || priceData.source==="loading" || priceData.source==="waiting";
  const loadMsg = priceData.source==="cached"
    ? `Cached data (${priceData.cacheDate}) — refresh by changing API key`
    : priceData.source==="error"
    ? `Error: ${priceData.errorMsg}`
    : priceData.source==="waiting"
    ? "Rate limited — retrying in ~15s…"
    : priceData.source==="nokey"
    ? "Enter your Alpha Vantage API key above to load data"
    : "";

  const txKey   = `cbs_tx_v2_${ticker.id}`;
  const cashKey = `cbs_cash_v2_${ticker.id}`;

  const [transactions, setTransactions] = useState(()=>{
    try{const s=localStorage.getItem(txKey);return s?JSON.parse(s):[];}catch(e){return [];}
  });

  // FIX 2: Starting Cash is user-editable, persisted per ticker
  const [startingCash, setStartingCash] = useState(()=>{
    try{const s=localStorage.getItem(cashKey);return s?parseFloat(s):200000;}catch(e){return 200000;}
  });
  const [editingCash,  setEditingCash]  = useState(false);
  const [cashDraft,    setCashDraft]    = useState("");

  const [selIdx,      setSelIdx]      = useState(null);
  const [action,      setAction]      = useState("BUY");
  const [amount,      setAmount]      = useState(0);
  const [activeTier,  setActiveTier]  = useState(null);  // FIX 3: null = no arrow until user clicks
  const [activeEvent, setActiveEvent] = useState("START");
  const [hoverIdx,    setHoverIdx]    = useState(null);
  const chartRef = useRef(null);



  const persistTx = useCallback(next=>{
    setTransactions(next);
    try{localStorage.setItem(txKey,JSON.stringify(next));}catch(e){}
  },[txKey]);

  function saveCash(val){
    const n=parseFloat(val);
    if(isNaN(n)||n<=0) return;
    setStartingCash(n);
    try{localStorage.setItem(cashKey,String(n));}catch(e){}
  }

  // Series with running peak + drawdown
  const series = useMemo(()=>{
    if(!priceData.rows.length) return [];
    let peak=-Infinity;
    return priceData.rows.map(r=>{
      peak=Math.max(peak,r.close);
      return{...r,peak,drawdown:(r.close-peak)/peak};
    });
  },[priceData.rows]);

  const epoch      = useMemo(()=>series.length?new Date(series[0].date):new Date(),[series]);
  const latest     = series.length?series[series.length-1]:null;
  const peakToDate = series.length?Math.max(...series.map(s=>s.close)):0;
  const curDD      = latest&&peakToDate?(latest.close-peakToDate)/peakToDate:0;

  const tierData = TIERS.map(t=>({
    ...t,
    triggerPrice:peakToDate*(1-t.drawdown/100),
    amount:startingCash*(t.pct/100),
  }));

  const portfolio = useMemo(()=>{
    let cash=startingCash, units=0;
    for(const tx of transactions){
      if(tx.action==="BUY"){cash-=tx.amount;units+=tx.units;}
      else{cash+=tx.amount;units-=tx.units;}
    }
    const lastPrice=latest?latest.close:0;
    const mktVal=units*lastPrice;
    const equity=cash+mktVal;
    const pnl=equity-startingCash;
    return{cash,units,mktVal,equity,pnl,ret:(pnl/startingCash)*100};
  },[transactions,latest,startingCash]);

  // Trade preview
  const selRow    = selIdx!==null&&series[selIdx]?series[selIdx]:latest;
  const prevPrice = selRow?selRow.close:0;
  const prevUnits = prevPrice>0?amount/prevPrice:0;
  const prevDayN  = selRow?dayN(selRow.date,epoch):0;
  const prevCash  = action==="BUY"?portfolio.cash-amount:portfolio.cash+amount;
  const prevUA    = action==="BUY"?portfolio.units+prevUnits:portfolio.units-prevUnits;
  const prevEq    = prevCash+prevUA*prevPrice;

  // Chart geometry
  const W=1200,H=220,PL=58,PR=20,PT=18,PB=22;
  const geo = useMemo(()=>{
    if(!series.length) return null;
    const closes=series.map(s=>s.close);
    const minC=Math.min(...closes)*0.97,maxC=Math.max(...closes)*1.03,n=series.length;
    const x=i=>PL+(i/(n-1))*(W-PL-PR);
    const y=v=>PT+(1-(v-minC)/(maxC-minC))*(H-PT-PB);
    return{minC,maxC,x,y,n};
  },[series]);

  const linePath = useMemo(()=>{
    if(!geo) return "";
    return series.map((s,i)=>`${i===0?"M":"L"}${geo.x(i).toFixed(1)},${geo.y(s.close).toFixed(1)}`).join(" ");
  },[series,geo]);

  const ddBands = useMemo(()=>{
    if(!geo) return [];
    const bands=[];let start=null;
    for(let i=0;i<series.length;i++){
      if(series[i].drawdown<=-0.08&&start===null) start=i;
      if(series[i].drawdown>-0.08&&start!==null){bands.push([start,i-1]);start=null;}
    }
    if(start!==null) bands.push([start,series.length-1]);
    return bands;
  },[series,geo]);

  const yTicks    = geo?[geo.minC,(geo.minC+geo.maxC)/2,geo.maxC]:[];
  const yearTicks = useMemo(()=>{
    const t=[];let last=null;
    for(let i=0;i<series.length;i++){
      const yr=series[i].date.slice(0,4);
      if(yr!==last){t.push({idx:i,year:yr});last=yr;}
    }
    return t;
  },[series]);

  const evMarkers = useMemo(()=>{
    if(!geo) return [];
    return EVENTS.filter(ev=>ev.date).map(ev=>{
      const idx=series.findIndex(s=>s.date>=ev.date);
      return idx<0?null:{...ev,idx,x:geo.x(idx)};
    }).filter(Boolean);
  },[series,geo]);

  function onChartClick(e){
    if(!geo||!chartRef.current) return;
    const rect=chartRef.current.getBoundingClientRect();
    const frac=((e.clientX-rect.left)/rect.width*W-PL)/(W-PL-PR);
    const idx=Math.round(frac*(geo.n-1));
    if(idx>=0&&idx<series.length) setSelIdx(idx);
  }
  function onChartMove(e){
    if(!geo||!chartRef.current) return;
    const rect=chartRef.current.getBoundingClientRect();
    const frac=((e.clientX-rect.left)/rect.width*W-PL)/(W-PL-PR);
    const idx=Math.round(frac*(geo.n-1));
    if(idx>=0&&idx<series.length) setHoverIdx(idx);
  }

  function execTrade(){
    if(!selRow||amount<=0) return;
    const tx={id:Date.now(),day:prevDayN,date:selRow.date,price:prevPrice,action,units:prevUnits,amount,cashAfter:prevCash,unitsAfter:prevUA,equityAfter:prevEq};
    persistTx([...transactions,tx]);
    setAmount(0);
  }

  function useTier(dd){
    setActiveTier(dd);
    const t=tierData.find(t=>t.drawdown===dd);
    if(t){
      setAmount(t.amount);
      const idx=series.findIndex(s=>s.close<=t.triggerPrice);
      if(idx>=0) setSelIdx(idx);
      setAction("BUY");
    }
  }

  // Smart Suggest: find highest drawdown tier currently triggered
  function smartSuggest(){
    if(!latest||!peakToDate) return;
    const curDDPct=Math.abs(curDD)*100;
    const triggered=[...tierData].reverse().find(t=>curDDPct>=t.drawdown);
    if(triggered){ useTier(triggered.drawdown); }
    else { useTier(tierData[0].drawdown); }
  }

  // Reset portfolio for this ticker
  function resetPortfolio(){
    if(!window.confirm("Reset all "+ticker.id+" trades? This cannot be undone.")) return;
    persistTx([]);
    setActiveTier(null);
    setAmount(0);
    setSelIdx(null);
    setActiveEvent("START");
  }

  // Which tiers are currently triggered by latest price
  const triggeredTiers=useMemo(()=>{
    if(!latest||!peakToDate) return new Set();
    const pct=Math.abs(curDD)*100;
    return new Set(TIERS.filter(t=>pct>=t.drawdown).map(t=>t.drawdown));
  },[curDD,latest,peakToDate]);

  // Event pill click — jump chart to crash date
  function onEventClick(ev){
    setActiveEvent(ev.label);
    if(!ev.date){
      // START — jump to beginning
      setSelIdx(0);
      return;
    }
    if(!series.length) return;
    const idx=series.findIndex(s=>s.date>=ev.date);
    if(idx>=0) setSelIdx(idx);
  }

  const S=styles;
  return (
    <div>
      <div style={S.tickerBar}>
        <span style={S.tickerName}>{ticker.fullName}</span>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {loading?(
            <span style={{...S.dot,background:"#f5a623",animation:"pulse 1.2s infinite"}}/>
          ):priceData.source==="live"?(
            <span style={{...S.dot,background:"#22c55e"}}/>
          ):priceData.source==="cached"?(
            <span style={{...S.dot,background:"#f59e0b"}}/>
          ):(
            <span style={{...S.dot,background:"#ef4444"}}/>
          )}
          <span style={S.statusTxt}>
            {loading
              ? (priceData.source==="waiting"?"Rate limited, retrying…":"Fetching…")
              : priceData.source==="live"
              ? `Live · Alpha Vantage · ${priceData.rows.length} weeks`
              : priceData.source==="cached"
              ? `Cached · ${priceData.cacheDate}`
              : priceData.source==="nokey"
              ? "Enter API key above"
              : "Error"}
          </span>
        </div>
      </div>

      {loadMsg&&<div style={S.warnBanner}>{loadMsg}</div>}

      <div style={S.grid}>
        {/* ── LEFT ── */}
        <div style={S.leftCol}>

          {/* Peak / Drawdown */}
          <div style={S.card}>
            <div style={S.cardLabel}>Peak To Date</div>
            <div style={{display:"flex",alignItems:"baseline",gap:12,padding:"4px 16px 2px"}}>
              <div style={S.peakVal}>{fmt$(peakToDate)}</div>
              <div style={{
                fontFamily:"'JetBrains Mono',monospace",
                fontSize:15,
                fontWeight:700,
                color: curDD<=-0.10?"#dc2626": curDD<=-0.05?"#f59e0b":"#16a34a",
                letterSpacing:-0.3
              }}>
                {curDD===0?"ATH ▲":`${(curDD*100).toFixed(2)}% from ATH`}
              </div>
            </div>
            <div style={S.ddBarWrap}>
              <div style={{...S.ddBarFill,left:`${Math.min(100,Math.max(0,(Math.abs(curDD)/0.3)*100))}%`}}/>
            </div>
            <div style={S.ddBarLabels}><span>-10%</span><span>-15%</span><span>-20%</span><span>-25%</span><span>-30%</span></div>
            {/* FIX 1: clickable event pills */}
            <div style={S.eventRow}>
              {EVENTS.map(ev=>(
                <button key={ev.label}
                  onClick={()=>onEventClick(ev)}
                  style={activeEvent===ev.label?{...S.pill,...S.pillActive,...S.pillBtn}:{...S.pill,...S.pillBtn}}
                  title={ev.date?`Jump to ${ev.label}`:"Jump to start"}>
                  {ev.label}
                </button>
              ))}
            </div>
          </div>

          {/* Portfolio */}
          <div style={S.card}>
            <div style={S.cardHdr}>
              PORTFOLIO
              <button onClick={resetPortfolio} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,color:"#fca5a5",background:"none",border:"1px solid #fca5a5",borderRadius:4,padding:"3px 10px",cursor:"pointer",letterSpacing:0.5}}>
                ↺ Reset
              </button>
            </div>
            <div style={S.cardBody}>
              {/* FIX 2: editable Starting Cash */}
              <div style={{...S.rowItem,alignItems:"center"}}>
                <span style={{color:"#64748b"}}>Starting Cash</span>
                {editingCash?(
                  <div style={{display:"flex",gap:4,alignItems:"center"}}>
                    <input
                      autoFocus
                      type="number"
                      value={cashDraft}
                      onChange={e=>setCashDraft(e.target.value)}
                      onKeyDown={e=>{
                        if(e.key==="Enter"){saveCash(cashDraft);setEditingCash(false);}
                        if(e.key==="Escape") setEditingCash(false);
                      }}
                      style={{width:110,padding:"3px 7px",fontFamily:"'JetBrains Mono',monospace",fontSize:13,border:"1px solid #1e3a8a",borderRadius:4,textAlign:"right"}}
                    />
                    <button onClick={()=>{saveCash(cashDraft);setEditingCash(false);}} style={S.cashSaveBtn}>✓</button>
                  </div>
                ):(
                  <button onClick={()=>{setCashDraft(String(startingCash));setEditingCash(true);}} style={S.cashEditBtn} title="Click to edit">
                    {fmt$(startingCash,0)} ✎
                  </button>
                )}
              </div>
              <PRow label="Cash Balance"  value={fmt$(portfolio.cash)}   bold/>
              <PRow label="Units Held"    value={fmtU(portfolio.units)}  bold/>
              <PRow label="Market Value"  value={fmt$(portfolio.mktVal)} bold/>
              <div style={S.divider}/>
              <PRow label="Total Equity"  value={fmt$(portfolio.equity)} highlight/>
              <PRow label="P&L"           value={fmt$(portfolio.pnl)}    vcolor={portfolio.pnl>=0?"#16a34a":"#dc2626"}/>
              <PRow label="Return %"      value={`${portfolio.ret>=0?"+":""}${portfolio.ret.toFixed(2)}%`} vcolor={portfolio.ret>=0?"#16a34a":"#dc2626"}/>
            </div>
          </div>

          {/* Allocation Guide */}
          <div style={S.card}>
            <div style={S.cardHdr}>ALLOCATION GUIDE <span style={S.cardHdrSub}>Crash-Buying Rule</span></div>
            <table style={S.tbl}>
              <thead><tr>
                <th style={S.th}>DRAWDOWN</th>
                <th style={S.th}>TRIGGER PRICE</th>
                <th style={S.th}>%</th>
                <th style={S.th}>AMOUNT</th>
                <th style={S.th}></th>
              </tr></thead>
              <tbody>
                {tierData.map(t=>{
                  const active=activeTier===t.drawdown;
                  const triggered=triggeredTiers.has(t.drawdown);
                  const rowStyle={
                    ...(active?{background:"#fffbeb"}:{}),
                    ...(triggered&&!active?{background:"#f0fdf4"}:{}),
                    borderLeft: triggered?"3px solid #16a34a":"3px solid transparent",
                  };
                  return(
                    <tr key={t.drawdown} style={rowStyle}>
                      <td style={S.td}>
                        {active&&<span style={{color:"#f59e0b",marginRight:4}}>▸</span>}
                        {triggered&&!active&&<span style={{color:"#16a34a",marginRight:4,fontSize:10}}>●</span>}
                        -{t.drawdown}%
                      </td>
                      <td style={S.td}>{fmt$(t.triggerPrice)}</td>
                      <td style={S.td}>{t.pct}%</td>
                      <td style={S.tdM}>{fmt$(t.amount)}</td>
                      <td style={S.td}><button onClick={()=>useTier(t.drawdown)} style={active?S.useBtnA:triggered?{...S.useBtn,borderColor:"#16a34a",color:"#16a34a"}:S.useBtn}>Use</button></td>
                    </tr>
                  );
                })}
                <tr>
                  <td style={S.td} colSpan={2}>Reserve</td>
                  <td style={S.td}>0%</td>
                  <td style={S.tdM}>$0.00</td>
                  <td/>
                </tr>
                <tr style={{background:"#f8fafc"}}>
                  <td style={S.tdB}>Total</td><td/><td style={S.tdB}>100%</td>
                  <td style={S.tdMB}>{fmt$(startingCash)}</td><td/>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        {/* ── RIGHT ── */}
        <div style={S.rightCol}>

          {/* Chart */}
          <div style={S.chartCard}>
            {loading?(
              <div style={S.chartEmpty}>
                <div style={{width:28,height:28,border:"3px solid #e2e8f0",borderTopColor:"#1e3a8a",borderRadius:"50%",animation:"spin 0.8s linear infinite",marginBottom:12}}/>
                Fetching {ticker.id} price history…
              </div>
            ):series.length?(
              <svg ref={chartRef} viewBox={`0 0 ${W} ${H}`} style={S.svg}
                onClick={onChartClick} onMouseMove={onChartMove} onMouseLeave={()=>setHoverIdx(null)}>
                {ddBands.map(([s,e],i)=>(
                  <rect key={i} x={geo.x(s)} y={PT} width={Math.max(1,geo.x(e)-geo.x(s))} height={H-PT-PB} fill="#fca5a5" opacity={0.2}/>
                ))}
                {yTicks.map((v,i)=>(
                  <g key={i}>
                    <line x1={PL} x2={W-PR} y1={geo.y(v)} y2={geo.y(v)} stroke="#e5e7eb" strokeWidth="1"/>
                    <text x={PL-6} y={geo.y(v)+4} textAnchor="end" style={S.axTxt}>{v>=1000?`${(v/1000).toFixed(0)}k`:v.toFixed(0)}</text>
                  </g>
                ))}
                {yearTicks.map((t,i)=>(
                  <text key={i} x={geo.x(t.idx)} y={H-5} textAnchor="middle" style={S.axTxt}>{t.year}</text>
                ))}
                <path d={linePath} fill="none" stroke="#1e3a8a" strokeWidth="1.5"/>
                {evMarkers.map(ev=>(
                  <g key={ev.label}>
                    <line x1={ev.x} x2={ev.x} y1={PT} y2={H-PB} stroke="#f59e0b" strokeWidth="1" strokeDasharray="3,3"/>
                    <text x={ev.x+3} y={PT+10} style={{...S.axTxt,fill:"#d97706",fontSize:8}}>{ev.label.split(" ").slice(-1)[0]}</text>
                  </g>
                ))}
                {transactions.map(tx=>{
                  const idx=series.findIndex(s=>s.date===tx.date);
                  if(idx<0) return null;
                  return<circle key={tx.id} cx={geo.x(idx)} cy={geo.y(series[idx].close)} r="4" fill={tx.action==="BUY"?"#16a34a":"#dc2626"} stroke="#fff" strokeWidth="1.5"/>;
                })}
                {selIdx!==null&&series[selIdx]&&(
                  <circle cx={geo.x(selIdx)} cy={geo.y(series[selIdx].close)} r="5" fill="#f59e0b" stroke="#1e293b" strokeWidth="1.5"/>
                )}
                {hoverIdx!==null&&series[hoverIdx]&&(
                  <line x1={geo.x(hoverIdx)} x2={geo.x(hoverIdx)} y1={PT} y2={H-PB} stroke="#94a3b8" strokeWidth="1" strokeDasharray="2,2"/>
                )}
              </svg>
            ):(
              <div style={S.chartEmpty}>
              {priceData.source==="nokey"&&"Enter your Alpha Vantage API key above to load data"}
              {priceData.source==="waiting"&&"⟳ Rate limited — retrying shortly…"}
              {priceData.source==="error"&&`Error: ${priceData.errorMsg}`}
              {priceData.source==="loading"&&"Fetching price history…"}
              {(priceData.source===""||(!priceData.rows?.length&&!["nokey","waiting","error","loading"].includes(priceData.source)))&&(loadMsg||"No data available.")}
            </div>
            )}
            {hoverIdx!==null&&series[hoverIdx]&&(
              <div style={S.tooltip}>
                {fmtDt(series[hoverIdx].date)} · {fmt$(series[hoverIdx].close)} · DD {(series[hoverIdx].drawdown*100).toFixed(1)}%
              </div>
            )}
            <div style={S.chartHint}>Weekly data · Click chart to select a trade date · Green/red dots = your trades · Yellow dashed lines = crash events</div>
          </div>

          {/* Trade Input */}
          <div style={S.card}>
            <div style={S.cardHdr}>TRADE INPUT</div>
            <div style={S.tradeGrid}>
              <div>
                <div style={S.fldLbl}>ACTION</div>
                <div style={S.actToggle}>
                  <button onClick={()=>setAction("BUY")}  style={action==="BUY"?S.buyA:S.buy}>BUY</button>
                  <button onClick={()=>setAction("SELL")} style={action==="SELL"?S.sellA:S.sell}>SELL</button>
                </div>
              </div>
              <div>
                <div style={S.fldLbl}>AMOUNT ($)</div>
                <input type="number" value={amount} onChange={e=>setAmount(parseFloat(e.target.value)||0)} style={S.inp}/>
              </div>
              <div>
                <div style={S.fldLbl}>UNITS (AUTO)</div>
                <input type="text" readOnly value={fmtU(prevUnits)} style={S.inpRO}/>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                <button onClick={smartSuggest} style={S.sugBtn} title="Auto-detects highest triggered tier">Suggest</button>
                <button onClick={execTrade} style={S.exeBtn}>Execute Trade</button>
              </div>
            </div>
            <div style={S.prevBox}>
              <div style={S.prevHdr}>TRADE PREVIEW</div>
              <div style={S.prevGrid}>
                <PF label="DAY#"         value={prevDayN}/>
                <PF label="DATE"         value={selRow?fmtDt(selRow.date):"—"}/>
                <PF label="PRICE"        value={fmt$(prevPrice)}/>
                <PF label="ACTION"       value={action} color={action==="BUY"?"#16a34a":"#dc2626"}/>
                <PF label="UNITS"        value={fmtU(prevUnits)}/>
                <PF label="AMOUNT"       value={fmt$(amount)}/>
                <PF label="CASH AFTER"   value={fmt$(prevCash)}/>
                <PF label="UNITS AFTER"  value={fmtU(prevUA)}/>
                <PF label="EQUITY AFTER" value={fmt$(prevEq)} bold/>
              </div>
            </div>
          </div>

          {/* Transaction Log */}
          <div style={S.card}>
            <div style={S.cardHdr}>TRANSACTION LOG <span style={S.cardHdrSub}>{transactions.length} trades logged</span></div>
            {transactions.length===0?(
              <div style={S.empty}>No trades yet — select a date on the chart and execute a trade.</div>
            ):(
              <div style={{overflowX:"auto"}}>
                <table style={S.tbl}>
                  <thead><tr>
                    {["#","DAY","DATE","PRICE","ACTION","UNITS","AMOUNT","CASH AFTER","UNITS AFTER","EQUITY AFTER",""].map(h=>(
                      <th key={h} style={S.th}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {transactions.map((tx,i)=>(
                      <tr key={tx.id}>
                        <td style={S.td}>{i+1}</td>
                        <td style={S.td}>{tx.day}</td>
                        <td style={S.td}>{fmtDt(tx.date)}</td>
                        <td style={S.tdM}>{fmt$(tx.price)}</td>
                        <td style={S.td}><span style={tx.action==="BUY"?S.buyTag:S.sellTag}>{tx.action}</span></td>
                        <td style={S.tdM}>{fmtU(tx.units)}</td>
                        <td style={S.tdM}>{fmt$(tx.amount)}</td>
                        <td style={S.tdM}>{fmt$(tx.cashAfter)}</td>
                        <td style={S.tdM}>{fmtU(tx.unitsAfter)}</td>
                        <td style={S.tdMB}>{fmt$(tx.equityAfter)}</td>
                        <td style={S.td}><button onClick={()=>persistTx(transactions.filter(t=>t.id!==tx.id))} style={S.delBtn}>×</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Sub-components ───────────────────────────────────────────────────────────
function PRow({label,value,bold,highlight,vcolor}){
  return(
    <div style={{...styles.rowItem,...(highlight?styles.rowHL:{})}}>
      <span style={{color:"#64748b"}}>{label}</span>
      <span style={{fontFamily:"'JetBrains Mono',monospace",color:vcolor||"#1e293b",...((bold||highlight)?{fontWeight:700}:{})}}>{value}</span>
    </div>
  );
}
function PF({label,value,bold,color}){
  return(
    <div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:"#94a3b8",marginBottom:2}}>{label}</div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:color||"#1e293b",...(bold?{fontWeight:700}:{})}}>{value}</div>
    </div>
  );
}

// ─── Root App ─────────────────────────────────────────────────────────────────
function App(){
  const [activeTicker,setActiveTicker]=useState("QQQ");
  const [apiKey, setApiKey]=useState(()=>getAvKey());
  const [keyDraft, setKeyDraft]=useState(()=>getAvKey());
  const [keyEditing, setKeyEditing]=useState(()=>!getAvKey());

  // Central price data store: { SPX: {rows,source,...}, SPY: {...}, ... }
  const [priceStore, setPriceStore]=useState(()=>{
    // Initialise from cache for all tickers immediately
    const store={};
    for(const t of TICKERS){
      const cached=loadFromCache(t.id);
      store[t.id]=cached||{rows:[],source:"nokey"};
    }
    return store;
  });
  const [fetchQueue, setFetchQueue]=useState([]); // ticker ids queued to fetch
  const [fetching,   setFetching]  =useState(null); // ticker id currently fetching

  function applyKey(){
    const k=keyDraft.trim();
    saveAvKey(k);
    setApiKey(k);
    setKeyEditing(false);
    if(k.length>5){
      // Queue all tickers that have no live data yet
      setFetchQueue(TICKERS.map(t=>t.id));
    }
  }

  // Sequential fetch queue processor — 1.3s between requests for AV rate limit
  useEffect(()=>{
    if(!apiKey||apiKey.length<=5||fetchQueue.length===0||fetching) return;
    const [next,...rest]=fetchQueue;
    const ticker=TICKERS.find(t=>t.id===next);
    if(!ticker) return;
    setFetching(next);
    setFetchQueue(rest);
    setPriceStore(s=>({...s,[next]:{...s[next],source:"loading"}}));
    fetchTickerLive(ticker,apiKey)
      .then(result=>{
        setPriceStore(s=>({...s,[next]:result}));
        setFetching(null);
      })
      .catch(e=>{
        console.warn("[CBS] fetch error",next,":",e.message);
        // On rate limit, requeue at end after delay
        const isRateLimit=e.message.includes("sparingly")||e.message.includes("per se");
        if(isRateLimit){
          setPriceStore(s=>({...s,[next]:{...s[next],source:"waiting",errorMsg:"Rate limited — retrying…"}}));
          setTimeout(()=>setFetchQueue(q=>[...q,next]),15000);
        } else {
          setPriceStore(s=>({...s,[next]:{rows:[],source:"error",errorMsg:e.message.slice(0,120)}}));
        }
        setFetching(null);
      });
  },[fetchQueue,fetching,apiKey]);

  // Kick off fetch queue when apiKey is already set on mount
  useEffect(()=>{
    if(!apiKey||apiKey.length<=5) return;
    // Only fetch tickers not already cached live
    const needFetch=TICKERS.filter(t=>{
      const d=priceStore[t.id];
      return !d||d.source==="nokey"||d.source==="error";
    }).map(t=>t.id);
    if(needFetch.length>0) setFetchQueue(needFetch);
  },[apiKey]);

  return(
    <div style={styles.page}>
      <div style={styles.appHdr}>
        <div>
          <div style={styles.eyebrow}>BACKTESTING SIMULATOR · DRAWDOWN-TRIGGERED DCA · WEEKLY PRICE DATA</div>
          <div style={styles.title}>Crash Buying Simulator</div>
        </div>
        <div style={styles.legend}>
          <span style={styles.legendItem}><span style={{...styles.legendDot,background:"#16a34a"}}/>Buy trade</span>
          <span style={styles.legendItem}><span style={{...styles.legendDot,background:"#dc2626"}}/>Sell trade</span>
          <span style={styles.legendItem}><span style={{width:24,height:10,borderRadius:2,background:"#fca5a5",opacity:0.7,display:"inline-block"}}/>Drawdown &gt;8%</span>
        </div>
      </div>

      {/* Alpha Vantage API Key Bar */}
      <div style={styles.keyBar}>
        <span style={styles.keyLabel}>DATA SOURCE</span>
        {fetching&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#f59e0b",animation:"pulse 1s infinite"}}>
          ⟳ Fetching {fetching}{fetchQueue.length>0?` (+${fetchQueue.length} queued)`:""} …
        </span>}
        {keyEditing?(
          <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
            <input
              autoFocus
              type="text"
              placeholder="Paste your Alpha Vantage API key here…"
              value={keyDraft}
              onChange={e=>setKeyDraft(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")applyKey();}}
              style={styles.keyInput}
            />
            <button onClick={applyKey} style={styles.keyApplyBtn}>Load Data</button>
            <a href="https://www.alphavantage.co/support/#api-key" target="_blank" rel="noopener"
               style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#6366f1",textDecoration:"none"}}>
              Get free key ↗
            </a>
          </div>
        ):(
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#334155"}}>
              Alpha Vantage · {apiKey?`key: ****${apiKey.slice(-4)}`:"no key set"}
            </span>
            <button onClick={()=>{setKeyDraft(apiKey);setKeyEditing(true);}} style={styles.keyChangeBtn}>Change</button>
          </div>
        )}
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#94a3b8",marginLeft:"auto",whiteSpace:"nowrap"}}>
          Free · 25 req/day · CORS-safe
        </span>
      </div>

      <div style={styles.tabBar}>
        {TICKERS.map(t=>(
          <button key={t.id} onClick={()=>setActiveTicker(t.id)} style={activeTicker===t.id?styles.tabActive:styles.tab}>
            {t.label}
          </button>
        ))}
      </div>
      {TICKERS.map(t=>(
        <div key={t.id} style={{display:activeTicker===t.id?"block":"none"}}>
          <TickerSim ticker={t} priceData={priceStore[t.id]||{rows:[],source:"nokey"}}/>
        </div>
      ))}
    </div>
  );
}
