<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Crash Buying Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
<style>
  html,body{margin:0;padding:0;background:#f8f9fb;}
  *{box-sizing:border-box;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes spin{to{transform:rotate(360deg)}}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#f1f5f9}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
</style>
</head>
<body>
<div id="root">
  <div style="font-family:-apple-system,sans-serif;padding:60px;color:#64748b;text-align:center;font-size:15px;">
    Loading Crash Buying Simulator…
  </div>
</div>
<script>
window.addEventListener('error',function(e){
  var r=document.getElementById('root');
  if(r) r.innerHTML='<div style="font-family:monospace;padding:24px;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;margin:20px;white-space:pre-wrap;"><strong>Script error:</strong>\n'+(e.message||'Unknown')+'</div>';
});
</script>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef} = React;

// ─── Config ───────────────────────────────────────────────────────────────────
const TICKERS = [
  // Stooq: ^spx gives real index (~7500 level), not ETF prices
  // SPX has no Finnhub symbol — live quote via Yahoo Finance instead
  { id:"SPX",  label:"SPX",  fullName:"S&P 500 Index",          fhSym:null,   yfSym:"^GSPC", isIndex:true  },
  { id:"SPY",  label:"SPY",  fullName:"SPDR S&P 500 ETF",       fhSym:"SPY",  yfSym:"SPY"   },
  { id:"QQQ",  label:"QQQ",  fullName:"Invesco Nasdaq-100 ETF",  fhSym:"QQQ",  yfSym:"QQQ"   },
  { id:"VOO",  label:"VOO",  fullName:"Vanguard S&P 500 ETF",    fhSym:"VOO",  yfSym:"VOO"   },
  { id:"URTH", label:"URTH", fullName:"iShares MSCI World ETF",  fhSym:"URTH", yfSym:"URTH"  },
];

const TIERS = [
  {drawdown:10,pct:10},
  {drawdown:15,pct:15},
  {drawdown:20,pct:20},
  {drawdown:25,pct:25},
  {drawdown:30,pct:30},
];

const EVENTS = [
  {label:"START",              date:null          },
  {label:"2018 Trade War",     date:"2018-10-01"  },
  {label:"2020 Covid",         date:"2020-02-20"  },
  {label:"2022 Inflation",     date:"2022-01-03"  },
  {label:"2025 Liberation Day",date:"2025-04-02"  },
];

// ─── Storage ──────────────────────────────────────────────────────────────────
const FH_KEY  = "cbs_fh_key_v1"; // Finnhub — live quotes only
const CACHE_V = "cbs_v13"; // v13: no sibling sharing, each ticker independent
const getKey  = k=>{ try{return localStorage.getItem(k)||"";}catch(e){return "";} };
const saveKey = (k,v)=>{ try{localStorage.setItem(k,v.trim());}catch(e){} };

// Purge any old price cache keys that don't match current version
// This ensures stale SPY-priced data never contaminates SPX tab
(function purgeOldCache(){
  try{
    const keep=new Set([FH_KEY,...["SPX","SPY","QQQ","VOO","URTH"].map(id=>`${CACHE_V}_${id}`)]);
    Object.keys(localStorage)
      .filter(k=>k.startsWith("cbs_")&&!keep.has(k))
      .forEach(k=>localStorage.removeItem(k));
  }catch(e){}
})();

// ─── CORS Proxy chain (same as working existing simulator) ────────────────────
const PROXIES = [
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://api.codetabs.com/v1/proxy?quest=${u}`,
  u=>`https://thingproxy.freeboard.io/fetch/${u}`,
];

async function fetchWithProxy(url, isJson=false){
  for(const makeProxy of PROXIES){
    try{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),10000);
      const res=await fetch(makeProxy(url),{signal:ctrl.signal});
      clearTimeout(tid);
      if(!res.ok) continue;
      if(isJson){
        const json=await res.json();
        if(json) return json;
      } else {
        const text=await res.text();
        // Reject HTML error pages
        if(text&&!text.trimStart().startsWith('<')&&text.includes(',')&&text.length>100) return text;
      }
    }catch(e){ /* try next proxy */ }
  }
  throw new Error('All proxies failed');
}

function parseStooqCSV(csv){
  const lines=csv.trim().split('\n');
  if(lines.length<2) throw new Error('Empty CSV');
  const header=lines[0].toLowerCase();
  if(!header.includes('close')) throw new Error('Unexpected CSV format');
  return lines.slice(1).map(line=>{
    const p=line.split(',');
    const close=parseFloat(p[4]);
    if(!p[0]||isNaN(close)||close<=0) return null;
    return {date:p[0].trim(),close};
  }).filter(Boolean).sort((a,b)=>a.date.localeCompare(b.date));
}

const YF_SYMBOLS = {SPX:'^GSPC',SPY:'SPY',QQQ:'QQQ',VOO:'VOO',URTH:'URTH'};

async function fetchYahooFinance(tickerId){
  const sym=YF_SYMBOLS[tickerId];
  if(!sym) throw new Error(`No YF symbol for ${tickerId}`);
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?range=10y&interval=1d&includePrePost=false`;
  const json=await fetchWithProxy(url,true);
  const result=json?.chart?.result?.[0];
  if(!result) throw new Error('YF no result');
  const {timestamp,indicators}=result;
  const closes=indicators?.quote?.[0]?.close;
  if(!timestamp||!closes) throw new Error('YF missing data');
  return timestamp.map((ts,i)=>{
    const close=closes[i];
    if(!close||close<=0) return null;
    return {date:new Date(ts*1000).toISOString().slice(0,10),close};
  }).filter(Boolean).sort((a,b)=>a.date.localeCompare(b.date));
}

// Stooq primary → Yahoo Finance fallback (identical to existing working simulator)
async function fetchPriceHistory(ticker, onStatus){
  const stooqSym={SPX:'^spx',SPY:'spy.us',QQQ:'qqq.us',VOO:'voo.us',URTH:'urth.us'}[ticker];
  // Try Stooq first
  try{
    if(onStatus) onStatus('stooq');
    const url=`https://stooq.com/q/d/l/?s=${stooqSym}&i=d&d1=20150101`;
    const csv=await fetchWithProxy(url);
    const parsed=parseStooqCSV(csv);
    if(parsed.length>50) return {rows:parsed,source:'Stooq'};
  }catch(e){
    console.warn(`[${ticker}] Stooq failed:`,e.message);
  }
  // Fallback: Yahoo Finance
  if(onStatus) onStatus('yahoo');
  const parsed=await fetchYahooFinance(ticker);
  if(parsed.length>50) return {rows:parsed,source:'Yahoo Finance'};
  throw new Error('Both Stooq and Yahoo Finance failed');
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
const fmt$ = (n,d=2)=>{
  if(n==null||isNaN(n)) return "—";
  return `${n<0?"-":""}$${Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})}`;
};
const fmtU  = n=>(n==null||isNaN(n))?"0.0000":n.toLocaleString("en-US",{minimumFractionDigits:4,maximumFractionDigits:4});
const fmtDt = d=>{ const dt=typeof d==="string"?new Date(d):d; return dt.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}); };
const dayN  = (ds,ep)=>Math.round((new Date(ds)-ep)/86400000);
const toUnix = s=>Math.floor(new Date(s).getTime()/1000);

// AV fetch removed — using Stooq + Yahoo Finance (no API key needed)

// ─── Finnhub: live quotes only (history via AV monthly) ──────────────────────
// ─── Live quotes: Finnhub for ETFs, Yahoo Finance for SPX (^GSPC) ───────────
async function fetchFHQuote(fhSym,fhKey){
  const url=`https://finnhub.io/api/v1/quote?symbol=${fhSym}&token=${fhKey}`;
  const r=await fetch(url,{signal:AbortSignal.timeout(10000)});
  if(!r.ok) throw new Error(`FH quote HTTP ${r.status}`);
  const json=await r.json();
  if(!json.c) throw new Error("No quote data");
  return {price:json.c, change:json.d, changePct:json.dp, prevClose:json.pc};
}

async function fetchYFQuote(yfSym){
  // Yahoo Finance quote via proxy — used for SPX (^GSPC) since Finnhub free
  // tier doesn't support index symbols
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(yfSym)}?range=1d&interval=1m`;
  const json=await fetchWithProxy(url,true);
  const result=json?.chart?.result?.[0];
  const meta=result?.meta;
  if(!meta?.regularMarketPrice) throw new Error("No YF quote data");
  const price=meta.regularMarketPrice;
  const prevClose=meta.previousClose||meta.chartPreviousClose||price;
  const change=price-prevClose;
  const changePct=(change/prevClose)*100;
  return {price, change, changePct, prevClose};
}

// ─── Cache ────────────────────────────────────────────────────────────────────
const cacheKey  = id=>`${CACHE_V}_${id}`;
function fromCache(id){
  try{
    const c=localStorage.getItem(cacheKey(id));
    if(c){const{rows,ts}=JSON.parse(c);return{rows,source:"cached",cacheDate:new Date(ts).toLocaleDateString()};}
  }catch(e){}
  return null;
}
function toCache(id,rows){
  try{localStorage.setItem(cacheKey(id),JSON.stringify({rows,ts:Date.now()}));}catch(e){}
}

// ─── Live fetch dispatcher ─────────────────────────────────────────────────────
async function fetchLive(ticker, _avKey, onStatus){
  // Stooq primary → Yahoo Finance fallback, no API key needed
  const result=await fetchPriceHistory(ticker.id, onStatus);
  toCache(ticker.id, result.rows);
  return {rows:result.rows, source:"live", sourceLabel:result.source};
}

// ─── Per-ticker Simulator // ─── Per-ticker Simulator ─────────────────────────────────────────────────────
function TickerSim({ticker,priceData,fhKey}){
  const loading = ["","loading","waiting"].includes(priceData.source);
  const loadMsg = priceData.source==="cached"
    ? `Cached data (${priceData.cacheDate}) — will refresh on next load`
    : priceData.source==="error"   ? `Error: ${priceData.errorMsg}`
    : priceData.source==="waiting" ? "Rate limited — retrying…"
    : priceData.source==="nokey"   ? "Loading…"
    : "";

  const txKey   = `cbs_tx_v2_${ticker.id}`;
  const cashKey = `cbs_cash_v2_${ticker.id}`;

  const [transactions,setTransactions]=useState(()=>{
    try{const s=localStorage.getItem(txKey);return s?JSON.parse(s):[];}catch(e){return [];}
  });
  const [startingCash,setStartingCash]=useState(()=>{
    try{const s=localStorage.getItem(cashKey);return s?parseFloat(s):200000;}catch(e){return 200000;}
  });
  const [editingCash,setEditingCash]=useState(false);
  const [cashDraft,  setCashDraft  ]=useState("");

  const [selIdx,     setSelIdx    ]=useState(null);
  const [action,     setAction    ]=useState("BUY");
  const [amount,     setAmount    ]=useState(0);
  const [activeTier, setActiveTier]=useState(null);
  const [activeEvent,setActiveEvent]=useState("START");
  const [hoverIdx,   setHoverIdx  ]=useState(null);

  // Live quote state
  const [liveQuote,  setLiveQuote ]=useState(null);
  const chartRef=useRef(null);

  // Fetch live quote every 60s
  // SPX: Yahoo Finance (^GSPC) via proxy — no Finnhub key needed
  // ETFs: Finnhub if key provided, else Yahoo Finance fallback
  useEffect(()=>{
    let cancelled=false;
    async function getQuote(){
      try{
        let q;
        if(!ticker.fhSym){
          // Index (SPX) — always use Yahoo Finance
          q=await fetchYFQuote(ticker.yfSym);
        } else if(fhKey&&fhKey.length>5){
          // ETF with Finnhub key
          q=await fetchFHQuote(ticker.fhSym,fhKey);
        } else {
          // ETF without Finnhub key — use Yahoo Finance
          q=await fetchYFQuote(ticker.yfSym);
        }
        if(!cancelled) setLiveQuote(q);
      }catch(e){console.warn("[CBS] quote",ticker.id,e.message);}
    }
    getQuote();
    const id=setInterval(getQuote,60000);
    return()=>{cancelled=true;clearInterval(id);};
  },[ticker.id,fhKey]);

  const persistTx=useCallback(next=>{
    setTransactions(next);
    try{localStorage.setItem(txKey,JSON.stringify(next));}catch(e){}
  },[txKey]);

  function saveCash(val){
    const n=parseFloat(val);
    if(isNaN(n)||n<=0) return;
    setStartingCash(n);
    try{localStorage.setItem(cashKey,String(n));}catch(e){}
  }

  const series=useMemo(()=>{
    if(!priceData.rows.length) return [];
    let peak=-Infinity;
    return priceData.rows.map(r=>{
      peak=Math.max(peak,r.close);
      return{...r,peak,drawdown:(r.close-peak)/peak};
    });
  },[priceData.rows]);

  const epoch      =useMemo(()=>series.length?new Date(series[0].date):new Date(),[series]);
  const latest     =series.length?series[series.length-1]:null;
  const histPeak   =series.length?Math.max(...series.map(s=>s.close)):0;

  // Use live quote price if available, otherwise use last close
  const currentPrice = liveQuote?.price || (latest?.close||0);

  // Peak = max of historical peak OR live price (handles case where live > cached history)
  const peakToDate   = Math.max(histPeak, currentPrice);
  const curDD        = peakToDate>0 ? (currentPrice-peakToDate)/peakToDate : 0;
  const curDDPct     = Math.abs(curDD)*100;

  const tierData=TIERS.map(t=>({
    ...t,
    triggerPrice:peakToDate*(1-t.drawdown/100),
    amount:startingCash*(t.pct/100),
    triggered: curDDPct >= t.drawdown,   // ← live drawdown trigger check
  }));

  const portfolio=useMemo(()=>{
    let cash=startingCash,units=0;
    for(const tx of transactions){
      if(tx.action==="BUY"){cash-=tx.amount;units+=tx.units;}
      else{cash+=tx.amount;units-=tx.units;}
    }
    const mktVal=units*currentPrice;
    const equity=cash+mktVal;
    const pnl=equity-startingCash;
    return{cash,units,mktVal,equity,pnl,ret:(pnl/startingCash)*100};
  },[transactions,currentPrice,startingCash]);

  const selRow    =selIdx!==null&&series[selIdx]?series[selIdx]:latest;
  const prevPrice =selRow?selRow.close:0;
  const prevUnits =prevPrice>0?amount/prevPrice:0;
  const prevDayN  =selRow?dayN(selRow.date,epoch):0;
  const prevCash  =action==="BUY"?portfolio.cash-amount:portfolio.cash+amount;
  const prevUA    =action==="BUY"?portfolio.units+prevUnits:portfolio.units-prevUnits;
  const prevEq    =prevCash+prevUA*prevPrice;

  const W=1200,H=220,PL=58,PR=20,PT=18,PB=22;
  const geo=useMemo(()=>{
    if(!series.length) return null;
    const closes=series.map(s=>s.close);
    const minC=Math.min(...closes)*0.97,maxC=Math.max(...closes)*1.03,n=series.length;
    const x=i=>PL+(i/(n-1))*(W-PL-PR);
    const y=v=>PT+(1-(v-minC)/(maxC-minC))*(H-PT-PB);
    return{minC,maxC,x,y,n};
  },[series]);

  const linePath=useMemo(()=>{
    if(!geo) return "";
    return series.map((s,i)=>`${i===0?"M":"L"}${geo.x(i).toFixed(1)},${geo.y(s.close).toFixed(1)}`).join(" ");
  },[series,geo]);

  const ddBands=useMemo(()=>{
    if(!geo) return [];
    const bands=[];let start=null;
    for(let i=0;i<series.length;i++){
      if(series[i].drawdown<=-0.08&&start===null) start=i;
      if(series[i].drawdown>-0.08&&start!==null){bands.push([start,i-1]);start=null;}
    }
    if(start!==null) bands.push([start,series.length-1]);
    return bands;
  },[series,geo]);

  const yTicks=geo?[geo.minC,(geo.minC+geo.maxC)/2,geo.maxC]:[];
  const yearTicks=useMemo(()=>{
    const t=[];let last=null;
    for(let i=0;i<series.length;i++){
      const yr=series[i].date.slice(0,4);
      if(yr!==last){t.push({idx:i,year:yr});last=yr;}
    }
    return t;
  },[series]);

  const evMarkers=useMemo(()=>{
    if(!geo) return [];
    return EVENTS.filter(ev=>ev.date).map(ev=>{
      const idx=series.findIndex(s=>s.date>=ev.date);
      return idx<0?null:{...ev,idx,x:geo.x(idx)};
    }).filter(Boolean);
  },[series,geo]);

  // Live price marker on chart
  const liveMarkerIdx = series.length-1;

  function onChartClick(e){
    if(!geo||!chartRef.current) return;
    const rect=chartRef.current.getBoundingClientRect();
    const frac=((e.clientX-rect.left)/rect.width*W-PL)/(W-PL-PR);
    const idx=Math.round(frac*(geo.n-1));
    if(idx>=0&&idx<series.length) setSelIdx(idx);
  }
  function onChartMove(e){
    if(!geo||!chartRef.current) return;
    const rect=chartRef.current.getBoundingClientRect();
    const frac=((e.clientX-rect.left)/rect.width*W-PL)/(W-PL-PR);
    const idx=Math.round(frac*(geo.n-1));
    if(idx>=0&&idx<series.length) setHoverIdx(idx);
  }

  function execTrade(){
    if(!selRow||amount<=0) return;
    const tx={id:Date.now(),day:prevDayN,date:selRow.date,price:prevPrice,action,units:prevUnits,amount,cashAfter:prevCash,unitsAfter:prevUA,equityAfter:prevEq};
    persistTx([...transactions,tx]);
    setAmount(0);
  }

  function useTierFn(dd){
    setActiveTier(dd);
    const t=tierData.find(t=>t.drawdown===dd);
    if(t){
      setAmount(t.amount);
      const idx=series.findIndex(s=>s.close<=t.triggerPrice);
      if(idx>=0) setSelIdx(idx);
      setAction("BUY");
    }
  }

  function smartSuggest(){
    const triggered=[...tierData].reverse().find(t=>curDDPct>=t.drawdown);
    useTierFn(triggered?triggered.drawdown:tierData[0].drawdown);
  }

  function onEventClick(ev){
    setActiveEvent(ev.label);
    if(!ev.date){setSelIdx(0);return;}
    if(!series.length) return;
    const idx=series.findIndex(s=>s.date>=ev.date);
    if(idx>=0) setSelIdx(idx);
  }

  function resetPortfolio(){
    if(!window.confirm(`Reset all ${ticker.id} trades? This cannot be undone.`)) return;
    persistTx([]);setActiveTier(null);setAmount(0);setSelIdx(null);setActiveEvent("START");
  }

  const S=styles;
  return (
    <div>
      <div style={S.tickerBar}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={S.tickerName}>{ticker.fullName}</span>
          {liveQuote&&(
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,
              color:liveQuote.changePct>=0?"#16a34a":"#dc2626"}}>
              {fmt$(liveQuote.price)} {liveQuote.changePct>=0?"▲":"▼"}{Math.abs(liveQuote.changePct).toFixed(2)}%
            </span>
          )}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {loading?<span style={{...S.dot,background:"#f5a623",animation:"pulse 1.2s infinite"}}/>
           :priceData.source==="live"?<span style={{...S.dot,background:"#22c55e"}}/>
           :priceData.source==="cached"?<span style={{...S.dot,background:"#f59e0b"}}/>
           :<span style={{...S.dot,background:"#ef4444"}}/>}
          <span style={S.statusTxt}>
            {loading?(priceData.source==="waiting"?"Retrying…":"Fetching…")
             :priceData.source==="live"?`Live · ${priceData.sourceLabel||""} · ${priceData.rows.length} days`
             :priceData.source==="cached"?`Cached · ${priceData.cacheDate}`
             :priceData.source==="nokey"?"Enter API key(s)":"Error"}
          </span>
        </div>
      </div>

      {loadMsg&&<div style={S.warnBanner}>{loadMsg}</div>}

      {/* SPX Reference Banner — same as existing working simulator */}
      {ticker.isIndex&&(
        <div style={{margin:"0 24px 0",padding:"12px 16px",background:"rgba(6,182,212,0.08)",border:"1px solid rgba(6,182,212,0.3)",borderRadius:8,fontSize:12}}>
          <div style={{fontWeight:700,color:"#0891b2",marginBottom:6}}>S&P 500 Index · Reference Only</div>
          <div style={{color:"#334155",lineHeight:1.6}}>
            This is the raw index tracked by Loo Cheng Chuan's crash-buying simulator.
            It is <em>not directly purchasable</em>. To act on drawdown signals, buy one of these ETFs:
          </div>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            {["SPY","VOO"].map(t=>(
              <span key={t} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,padding:"3px 12px",
                borderRadius:12,background:"rgba(59,130,246,0.1)",border:"1px solid #3b82f6",color:"#1d4ed8",fontWeight:700}}>
                {t} · ≈ SPX ÷ 10
              </span>
            ))}
          </div>
        </div>
      )}

      <div style={S.grid}>
        <div style={S.leftCol}>

          {/* Peak / Drawdown card */}
          <div style={S.card}>
            <div style={S.cardLabel}>Peak To Date</div>
            <div style={{display:"flex",alignItems:"baseline",gap:12,padding:"4px 16px 2px"}}>
              <div style={S.peakVal}>{fmt$(peakToDate)}</div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:15,fontWeight:700,
                color:curDD<=-0.10?"#dc2626":curDD<=-0.05?"#f59e0b":"#16a34a"}}>
                {curDD===0?"ATH ▲":`${(curDD*100).toFixed(2)}% from ATH`}
              </div>
              {liveQuote&&<div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#94a3b8"}}>live</div>}
            </div>
            <div style={S.ddBarWrap}>
              <div style={{...S.ddBarFill,left:`${Math.min(100,Math.max(0,(Math.abs(curDD)/0.3)*100))}%`}}/>
            </div>
            <div style={S.ddBarLabels}><span>-10%</span><span>-15%</span><span>-20%</span><span>-25%</span><span>-30%</span></div>
            <div style={S.eventRow}>
              {EVENTS.map(ev=>(
                <button key={ev.label} onClick={()=>onEventClick(ev)}
                  style={activeEvent===ev.label?{...S.pill,...S.pillActive,...S.pillBtn}:{...S.pill,...S.pillBtn}}>
                  {ev.label}
                </button>
              ))}
            </div>
          </div>

          {/* Portfolio */}

          <div style={S.chartCard}>

              </div>
            ):series.length?(
              <svg ref={chartRef} viewBox={`0 0 ${W} ${H}`} style={S.svg}
                onClick={onChartClick} onMouseMove={onChartMove} onMouseLeave={()=>setHoverIdx(null)}>
                {ddBands.map(([s,e],i)=>(
                  <rect key={i} x={geo.x(s)} y={PT} width={Math.max(1,geo.x(e)-geo.x(s))} height={H-PT-PB} fill="#fca5a5" opacity={0.2}/>
                ))}
                {yTicks.map((v,i)=>(
                  <g key={i}>
                    <line x1={PL} x2={W-PR} y1={geo.y(v)} y2={geo.y(v)} stroke="#e5e7eb" strokeWidth="1"/>
                    <text x={PL-6} y={geo.y(v)+4} textAnchor="end" style={S.axTxt}>{v>=1000?`${(v/1000).toFixed(0)}k`:v.toFixed(0)}</text>
                  </g>

                {yearTicks.map((t,i)=>(
                  <text key={i} x={geo.x(t.idx)} y={H-5} textAnchor="middle" style={S.axTxt}>{t.year}</text>

                {/* Tier trigger price lines */}
                {tierData.filter(t=>t.triggered).map(t=>(
                  <line key={t.drawdown} x1={PL} x2={W-PR} y1={geo.y(t.triggerPrice)} y2={geo.y(t.triggerPrice)}

                ))}
                <path d={linePath} fill="none" stroke="#1e3a8a" strokeWidth="1.5"/>
                {evMarkers.map(ev=>(
                  <g key={ev.label}>
                    <line x1={ev.x} x2={ev.x} y1={PT} y2={H-PB} stroke="#f59e0b" strokeWidth="1" strokeDasharray="3,3"/>
                    <text x={ev.x+3} y={PT+10} style={{...S.axTxt,fill:"#d97706",fontSize:8}}>{ev.label.split(" ").slice(-1)[0]}</text>
                  </g>

                  const idx=series.findIndex(s=>s.date===tx.date);
                  if(idx<0) return null;
                  return<circle key={tx.id} cx={geo.x(idx)} cy={geo.y(series[idx].close)} r="4" fill={tx.action==="BUY"?"#16a34a":"#dc2626"} stroke="#fff" strokeWidth="1.5"/>;

                {/* Live price dot */}
                {liveQuote&&geo&&series.length>(
                  <g>
                    <circle cx={geo.x(liveMarkerIdx)} cy={geo.y(liveQuote.price)} r="5" fill="#6366f1" stroke="#fff" strokeWidth="1.5"/>
                    <text x={geo.x(liveMarkerIdx)-6} y={geo.y(liveQuote.price)-8} textAnchor="end"
                      style={{...S.axTxt,fill:"#6366f1",fontSize:9,fontWeight:"bold"}}>
                      LIVE {fmt$(liveQuote.price)}

                  </g>
                )}
                {hoverIdx!==null&&series[hoverIdx]&&(
                  <line x1={geo.x(hoverIdx)} x2={geo.x(hoverIdx)} y1={PT} y2={H-PB} stroke="#94a3b8" strokeWidth="1" strokeDasharray="2,2"/>
                )}
              </svg>
            ):(
              <div style={S.chartEmpty}>
                {priceData.source==="nokey"?`Enter API key${ticker.useFinHubHistory?" (Finnhub for SPX)":" (Alpha Vantage)"} above`:loadMsg||"No data available."}
              </div>
            )}
            {hoverIdx!==null&&series[hoverIdx]&&(
              <div style={S.tooltip}>
                {fmtDt(series[hoverIdx].date)} · {fmt$(series[hoverIdx].close)} · DD {(series[hoverIdx].drawdown*100).toFixed(1)}%
              </div>
            )}
            <div style={S.chartHint}>
              Daily data · Click to select trade date · Green lines = active tier triggers · Purple dot = live price
            </div>
          </div>

          {/* Trade Input */}
          <div style={S.card}>
            <div style={S.cardHdr}>TRADE INPUT</div>
            <div style={S.tradeGrid}>
              <div>
                <div style={S.fldLbl}>ACTION</div>
                <div style={S.actToggle}>
                  <button onClick={()=>setAction("BUY")}  style={action==="BUY"?S.buyA:S.buy}>BUY</button>
                  <button onClick={()=>setAction("SELL")} style={action==="SELL"?S.sellA:S.sell}>SELL</button>
                </div>
              </div>
              <div>
                <div style={S.fldLbl}>AMOUNT ($)</div>
                <input type="number" value={amount} onChange={e=>setAmount(parseFloat(e.target.value)||0)} style={S.inp}/>
              </div>
              <div>
                <div style={S.fldLbl}>UNITS (AUTO)</div>
                <input type="text" readOnly value={fmtU(prevUnits)} style={S.inpRO}/>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                <button onClick={smartSuggest} style={S.sugBtn} title="Auto-detects highest triggered tier">Suggest</button>
                <button onClick={execTrade} style={S.exeBtn}>Execute Trade</button>
              </div>
            </div>
            <div style={S.prevBox}>
              <div style={S.prevHdr}>TRADE PREVIEW</div>
              <div style={S.prevGrid}>
                <PF label="DAY#"         value={prevDayN}/>
                <PF label="DATE"         value={selRow?fmtDt(selRow.date):"—"}/>
                <PF label="PRICE"        value={fmt$(prevPrice)}/>
                <PF label="ACTION"       value={action} color={action==="BUY"?"#16a34a":"#dc2626"}/>
                <PF label="UNITS"        value={fmtU(prevUnits)}/>
                <PF label="AMOUNT"       value={fmt$(amount)}/>
                <PF label="CASH AFTER"   value={fmt$(prevCash)}/>
                <PF label="UNITS AFTER"  value={fmtU(prevUA)}/>
                <PF label="EQUITY AFTER" value={fmt$(prevEq)} bold/>

            </div>
          </div>

          {/* Transaction Log */}
          <div style={S.card}>
            <div style={S.cardHdr}>TRANSACTION LOG <span style={S.cardHdrSub}>{transactions.length} trades logged</span></div>
            {transactions.length===0?(
              <div style={S.empty}>No trades yet — select a date on the chart and execute a trade.</div>
            ):(
              <div style={{overflowX:"auto"}}>
                <table style={S.tbl}>
                  <thead><tr>
                    {["#","DAY","DATE","PRICE","ACTION","UNITS","AMOUNT","CASH AFTER","UNITS AFTER","EQUITY AFTER",""].map(h=>(
                      <th key={h} style={S.th}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {transactions.map((tx,i)=>(
                      <tr key={tx.id}>
                        <td style={S.td}>{i+1}</td>
                        <td style={S.td}>{tx.day}</td>
                        <td style={S.td}>{fmtDt(tx.date)}</td>
                        <td style={S.tdM}>{fmt$(tx.price)}</td>
                        <td style={S.td}><span style={tx.action==="BUY"?S.buyTag:S.sellTag}>{tx.action}</span></td>
                        <td style={S.tdM}>{fmtU(tx.units)}</td>
                        <td style={S.tdM}>{fmt$(tx.amount)}</td>
                        <td style={S.tdM}>{fmt$(tx.cashAfter)}</td>
                        <td style={S.tdM}>{fmtU(tx.unitsAfter)}</td>
                        <td style={S.tdMB}>{fmt$(tx.equityAfter)}</td>
                        <td style={S.td}><button onClick={()=>persistTx(transactions.filter(t=>t.id!==tx.id))} style={S.delBtn}>×</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function PRow({label,value,bold,highlight,vcolor}){
  return(
    <div style={{...styles.rowItem,...(highlight?styles.rowHL:{})}}>
      <span style={{color:"#64748b"}}>{label}</span>
      <span style={{fontFamily:"'JetBrains Mono',monospace",color:vcolor||"#1e293b",...((bold||highlight)?{fontWeight:700}:{})}}>{value}</span>
    </div>
  );
}
function PF({label,value,bold,color}){
  return(
    <div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:"#94a3b8",marginBottom:2}}>{label}</div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:color||"#1e293b",...(bold?{fontWeight:700}:{})}}>{value}</div>
    </div>
  );
}

// ─── Root App ─────────────────────────────────────────────────────────────────
function App(){
  const [activeTicker,setActiveTicker]=useState("QQQ");
  const [fhKey,setFhKey]=useState(()=>getKey(FH_KEY));
  const [fhDraft,setFhDraft]=useState(()=>getKey(FH_KEY));
  const [showKeys,setShowKeys]=useState(false); // Key bar collapsed by default — no key needed for data

  const [priceStore,setPriceStore]=useState(()=>{
    const store={};
    for(const t of TICKERS){const c=fromCache(t.id);store[t.id]=c||{rows:[],source:"nokey"};}
    return store;
  });
  const [fetchQueue,setFetchQueue]=useState([]);
  const [fetching,  setFetching  ]=useState(null);

  function applyKeys(){
    const fh=fhDraft.trim();
    saveKey(FH_KEY,fh); setFhKey(fh);
    setShowKeys(false);
    // Re-queue all tickers for fresh fetch
    setFetchQueue(TICKERS.map(t=>t.id));
  }

  function startFetch(){
    // Kick off data loading (no key required)
    setFetchQueue(TICKERS.map(t=>t.id));
  }

  // Sequential fetch queue
  useEffect(()=>{
    if(fetchQueue.length===0||fetching) return;
    const [next,...rest]=fetchQueue;
    const ticker=TICKERS.find(t=>t.id===next);
    if(!ticker){setFetchQueue(rest);return;}
    setFetching(next);
    setFetchQueue(rest);
    setPriceStore(s=>({...s,[next]:{...s[next],source:"loading"}}));
    fetchLive(ticker, null, status=>setPriceStore(s=>({...s,[next]:{...s[next],source:status==="stooq"?"loading-stooq":"loading-yahoo"}})))
      .then(result=>{
        // Each ticker fetches independently — no cross-contamination
        setPriceStore(s=>({...s,[next]:result}));
        setFetching(null);
      })
      .catch(e=>{
        const isRate=e.message.includes("sparingly")||e.message.includes("per se")||e.message.includes("rate");
        if(isRate){
          setPriceStore(s=>({...s,[next]:{...s[next],source:"waiting",errorMsg:"Rate limited — retrying…"}}));
          setTimeout(()=>setFetchQueue(q=>[...q,next]),15000);
        } else {
          setPriceStore(s=>({...s,[next]:{rows:[],source:"error",errorMsg:e.message.slice(0,140)}}));
        }
        setFetching(null);
      });
  },[fetchQueue,fetching,fhKey]);

  // Kick off fetch on mount — no key needed for Stooq/Yahoo
  useEffect(()=>{
    setFetchQueue(TICKERS.map(t=>t.id));
  },[]);

  const NAVY="#1e3a8a";
  return(
    <div style={styles.page}>
      <div style={styles.appHdr}>
        <div>
          <div style={styles.eyebrow}>BACKTESTING SIMULATOR · DRAWDOWN-TRIGGERED DCA · DAILY DATA</div>
          <div style={styles.title}>Crash Buying Simulator</div>
        </div>
        <div style={styles.legend}>
          <span style={styles.legendItem}><span style={{...styles.legendDot,background:"#16a34a"}}/>Buy</span>
          <span style={styles.legendItem}><span style={{...styles.legendDot,background:"#dc2626"}}/>Sell</span>
          <span style={styles.legendItem}><span style={{...styles.legendDot,background:"#6366f1"}}/>Live price</span>
          <span style={styles.legendItem}><span style={{width:24,height:10,borderRadius:2,background:"#fca5a5",opacity:0.7,display:"inline-block"}}/>Drawdown &gt;8%</span>
        </div>
      </div>

      {/* Data source bar — no key needed for history, optional Finnhub for live quotes */}
      <div style={styles.keyBar}>
        <span style={styles.keyLabel}>DATA</span>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#334155"}}>
          Stooq · Yahoo Finance fallback · No API key needed
        </span>
        {fetching&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#f59e0b",animation:"pulse 1s infinite",marginLeft:12}}>
          ⟳ {fetching}{fetchQueue.length>0?` +${fetchQueue.length} queued`:""} …
        </span>}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          <span style={styles.keySubLabel}>Finnhub key (optional — live quotes only):</span>
          {showKeys?(
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <input type="text" placeholder="Paste Finnhub key…" value={fhDraft}
                onChange={e=>setFhDraft(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")applyKeys();}}
                style={{...styles.keyInput,width:180}}/>
              <button onClick={applyKeys} style={styles.keyApplyBtn}>Save</button>
              <a href="https://finnhub.io/register" target="_blank" rel="noopener" style={styles.keyLink}>Get free ↗</a>
            </div>
          ):(
            <button onClick={()=>setShowKeys(true)} style={styles.keyChangeBtn}>
              {fhKey?`Finnhub ****${fhKey.slice(-4)}`:"+ Add Finnhub key"}
            </button>
          )}
        </div>
      </div>

      {/* Tabs */}
      <div style={styles.tabBar}>
        {TICKERS.map(t=>(
          <button key={t.id} onClick={()=>setActiveTicker(t.id)}
            style={activeTicker===t.id?styles.tabActive:styles.tab}>
            {t.label}
            {/* Small status dot on tab */}
            {priceStore[t.id]&&<span style={{
              display:"inline-block",width:5,height:5,borderRadius:"50%",marginLeft:5,verticalAlign:"middle",
              background:priceStore[t.id].source==="live"?"#22c55e"
                :priceStore[t.id].source==="cached"?"#f59e0b"
                :["loading","waiting"].includes(priceStore[t.id].source)?"#f5a623"
                :"#ef4444"
            }}/>}
          </button>
        ))}
      </div>

      {TICKERS.map(t=>(
        <div key={t.id} style={{display:activeTicker===t.id?"block":"none"}}>
          <TickerSim ticker={t} priceData={priceStore[t.id]||{rows:[],source:"nokey"}} fhKey={fhKey}/>
        </div>
      ))}
    </div>
  );
}
